name: smoke

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Run scanner on scripts
        run: python scripts/check_training_stack.py scripts
